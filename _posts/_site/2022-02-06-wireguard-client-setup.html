<p>install prerequisites</p>
<blockquote>
  <p><code class="language-plaintext highlighter-rouge">sudo apt install resolvconf curl</code></p>
</blockquote>

<p>install wireguard</p>
<blockquote>
  <p><code class="language-plaintext highlighter-rouge">sudo apt install wireguard wg-quick</code></p>
</blockquote>

<p>mv .conf file to /etc/wireguard/
start vpn</p>
<blockquote>
  <p><code class="language-plaintext highlighter-rouge">wg-quick up file.conf</code></p>
</blockquote>
